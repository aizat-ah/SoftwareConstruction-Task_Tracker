stages:
  - test
  - sonarqube-check
  - deploy

# 1. A simple PHP syntax check to test the code
unit-test:
  stage: test
  image: php:8.1-cli
  script:
    - echo "Running PHP syntax checks..."
    - php -l api/tasks.php
    - echo "Tests passed!"

# 2. SonarQube / SonarCloud Analysis
sonarqube-check:
  stage: sonarqube-check
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project (required by SonarQube)
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    # Make sure your SONAR_TOKEN and SONAR_HOST_URL are set in GitLab -> Settings -> CI/CD -> Variables
    - sonar-scanner -Dsonar.projectKey=student-task-tracker -Dsonar.sources=.

# 3. Simulated Deployment
deploy-to-production:
  stage: deploy
  script:
    - echo "Deploying application to production server..."
    - echo "Deployment successful!"
  only:
    - main
