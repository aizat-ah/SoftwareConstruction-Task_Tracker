# ==========================================================================
# SonarQube configuration for the Student Task Tracker
# The scanner reads this file from the repo root during the CI pipeline.
#
# NOTE: Do NOT put the server URL or token here.
# Those are passed as CI/CD variables (SONAR_HOST_URL, SONAR_TOKEN)
# so secrets never live in the repository.
# ==========================================================================

# Must match the project key you create in the SonarQube web UI
sonar.projectKey=student-task-tracker
sonar.projectName=Student Task Tracker
sonar.projectVersion=1.0

# Folders to analyze (Vue frontend + PHP API)
sonar.sources=student-task-tracker/src,student-task-tracker/api

# Exclude dependencies, build output, and minified/vendor files
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.min.js,**/vendor/**

# File type hints
sonar.php.file.suffixes=php
sonar.javascript.file.suffixes=.js,.vue

sonar.sourceEncoding=UTF-8
